spring.application.name=bugreporter

# Database Configuration (Connects to Docker Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/bugreporter_db
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
# 'update' automatically updates the DB schema based on your Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mail Server Configuration (Connects to Docker Mailpit)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Local startup bootstrap (runs docker compose if required services are down)
app.startup.docker.enabled=true
app.startup.docker.required-ports=5432,1025
app.startup.docker.connect-timeout-millis=500
app.startup.docker.wait-timeout-seconds=60
app.startup.docker.poll-interval-millis=1000
app.startup.docker.compose-timeout-seconds=120

# JSON/Date formatting configurations
#spring.jackson.serialization.write-dates-as-timestamps=false