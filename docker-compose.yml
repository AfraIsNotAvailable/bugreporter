services:
  # PostgreSQL Database
  postgres:
    ##image: postgres:17-alpine
    #aici am modificat pentru ca imi dadea format error la docker
    image: postgres:17
    platform: linux/amd64
    container_name: bugreporter-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: bugreporter_db
    ports:
      #- "5432:5432"
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Mailpit - Local SMTP Testing Server
  mailpit:
    #image: axllent/mailpit:latest
    #aici am modificat pentru ca imi dadea format error la docker
    image: axllent/mailpit:v1.27
    platform: linux/amd64
    container_name: bugreporter-mail
    ports:
      - "1025:1025" # SMTP port for Spring Boot
      - "8025:8025" # Web UI port to view emails
    restart: unless-stopped

volumes:
  postgres-data: